<!-- Left side: contact info -->
<div class="contact-info">
  <h3>Let's Work Together</h3>
  <p>We are a passionate student team always looking to connect with other developers, mentors, and collaborators. Drop us a message!</p>

  <div class="contact-detail">
    <div class="contact-detail-icon">📧</div>
    <span>techstudents@email.com</span>
  </div>
  <div class="contact-detail">
    <div class="contact-detail-icon">📍</div>
    <span>Kerala, India</span>
  </div>
  <div class="contact-detail">
    <div class="contact-detail-icon">🐙</div>
    <span>github.com/techstudents</span>
  </div>
</div>

<!-- Right side: contact form -->
<form class="contact-form" onsubmit="handleSubmit(event)">
  <div class="form-group">
    <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="e.g. Arjun Kumar" required />
  </div>
  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="arjun@example.com" required />
  </div>
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Say hello, ask a question, or suggest a collaboration..." required></textarea>
  </div>
  <button type="submit" class="form-submit">Send Message ✉️</button>
</form>

<script>
function handleSubmit(e) {
  e.preventDefault();
  const btn = e.target.querySelector('.form-submit');
  btn.textContent = '✅ Message Sent!';
  btn.style.background = 'linear-gradient(135deg, #2E7D32, #43A047)';
  setTimeout(() => {
    btn.textContent = 'Send Message ✉️';
    btn.style.background = '';
    e.target.reset();
  }, 3000);
}
</script>
